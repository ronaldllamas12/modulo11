services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: reportes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/reportes
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app

volumes:
  pgdata:
